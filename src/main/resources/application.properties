# Server Configuration
server.port=${PORT:8090}

# MongoDB Configuration
spring.data.mongodb.uri=${URI:mongodb://localhost:27017}
spring.data.mongodb.database=catalog

# In Spring Boot, MongoDB authentication can be passed natively via the URI. 
# Or using specific properties:
spring.data.mongodb.username=${USER:admin}
spring.data.mongodb.password=${PASSWORD:admin}

# Swagger / OpenAPI Path
springdoc.swagger-ui.path=/swagger-ui.html

# Logger Settings mapping
logging.namespace=${LOGGER_NAMESPACE:}
logging.level.root=${LOGGER_LEVEL:INFO}

# Distributed Caching (Redis) Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# Event-Driven Architecture (Kafka) Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.group-id=catalog-api-group
spring.kafka.consumer.properties.spring.json.trusted.packages=*
