apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-catalog-api-secret
type: Opaque
stringData:
  # The URI targets the Kubernetes service name automatically generated by the MongoDB subchart
  database-uri: "mongodb://{{ .Values.mongodb.auth.username }}:{{ .Values.mongodb.auth.password }}@{{ .Release.Name }}-mongodb:27017/{{ .Values.mongodb.auth.database }}?authSource=admin"
